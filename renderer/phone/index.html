<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: http:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibraLink</title>
    <link rel="stylesheet" href="/phone/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="eyebrow">VibraLink</p>
        <h1>Listen to PC audio on your phone.</h1>
        <p class="lede">
          Make sure this phone is on the same WiFi network as the Windows PC.
        </p>

        <button id="connectButton" class="primary">Connect</button>
        <p id="status" class="status">Disconnected</p>
        <audio id="audio" autoplay playsinline controls></audio>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/phone/app.js"></script>
  </body>
  </html>
